<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Celebration Wall — MzansiBuilds</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav>
    <a href="/" class="logo">Mzansi<span>Builds</span></a>
    <div class="nav-links">
      <a href="/html/dashboard.html">Feed</a>
      <a href="/html/profile.html">Profile</a>
      <a href="/html/celebrate.html" class="active">Celebrate</a>
      <button class="btn-nav" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <div class="celebrate-layout">

    <!-- Header -->
    <div class="celebrate-header">
      <div class="celebrate-trophy">🏆</div>
      <h1>Celebration Wall</h1>
      <p>
        These developers built in public and shipped.
        They deserve to be celebrated!
      </p>
    </div>

    <!-- Stats Bar -->
    <div class="celebrate-stats">
      <div class="celebrate-stat">
        <div class="stat-num" id="total-shipped">0</div>
        <div class="stat-label">Projects Shipped</div>
      </div>
      <div class="celebrate-stat">
        <div class="stat-num" id="total-devs">0</div>
        <div class="stat-label">Developers</div>
      </div>
    </div>

    <!-- Celebration Cards -->
    <div id="celebrate-container">
      <div class="feed-loading">Loading celebration wall...</div>
    </div>

  </div>

  <footer>
    Built with love by <span>Mzansi developers</span> for developers everywhere.
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/celebrate.js"></script>

</body>
</html>
