<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — MzansiBuilds</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav>
    <a href="/" class="logo">Mzansi<span>Builds</span></a>
    <div class="nav-links">
      <a href="/html/dashboard.html">Feed</a>
      <a href="/html/profile.html" class="active">Profile</a>
      <a href="/html/celebrate.html">Celebrate</a>
      <button class="btn-nav" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <div class="profile-layout">

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-card-header">
        <div class="profile-avatar-xl" id="profile-initials">?</div>
        <div class="profile-card-info">
          <div class="profile-card-name" id="profile-username">
            Loading...
          </div>
          <div class="profile-card-email" id="profile-email"></div>
          <div class="profile-card-joined" id="profile-joined"></div>
        </div>
      </div>

      <div class="profile-bio-display" id="profile-bio-display">
        No bio yet. Tell the community about yourself!
      </div>

      <div class="profile-skills-display" id="profile-skills-display"></div>

      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
  <button class="btn-primary"
    id="edit-profile-btn"
    onclick="showProfileForm()"
    style="width:auto;padding:10px 24px">
    Edit Profile
  </button>
  <button class="btn-delete"
    onclick="handleDeleteAccount()"
    style="width:auto;padding:10px 24px">
    Delete Account
  </button>
</div>
    </div>

    <!-- Edit Profile Form -->
    <div id="profile-edit-form" class="profile-edit-card hidden">
      <h2 class="edit-form-title">Edit Profile</h2>
      <div id="profile-alert" class="alert"></div>

      <div class="form-group">
        <label for="edit-username">Username</label>
        <input type="text" id="edit-username" placeholder="yourname" />
      </div>

      <div class="form-group">
        <label for="edit-bio">Bio</label>
        <textarea id="edit-bio" rows="3"
          placeholder="Tell the community about yourself...">
        </textarea>
      </div>

      <div class="form-group">
        <label for="edit-skills">
          Skills
          <span style="font-weight:400;color:#888">
            (comma separated e.g. React, Node.js, Python)
          </span>
        </label>
        <input type="text" id="edit-skills"
          placeholder="React, Node.js, Supabase..." />
      </div>

      <div class="form-actions">
        <button class="btn-secondary"
          onclick="hideProfileForm()">
          Cancel
        </button>
        <button class="btn-primary"
          id="save-profile-btn"
          onclick="handleUpdateProfile()"
          style="width:auto;padding:10px 24px">
          Save Profile
        </button>
      </div>
    </div>

    <!-- My Projects -->
    <div class="profile-projects-card">
      <h2 class="comments-title">My Projects</h2>
      <div id="my-projects-container">
        <div class="feed-loading">Loading your projects...</div>
      </div>
    </div>

  </div>

  <footer>
    Built with love by <span>Mzansi developers</span> for developers everywhere.
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>

</body>
</html>
