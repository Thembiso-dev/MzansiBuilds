<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — MzansiBuilds</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav>
    <a href="/" class="logo">Mzansi<span>Builds</span></a>
    <div class="nav-links">
      <a href="/html/login.html" class="btn-nav">Login</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="subtitle">Join developers building in public</p>

      <div id="alert-box" class="alert"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="yourname"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="At least 6 characters"
          autocomplete="new-password"
        />
      </div>

      <button class="btn-primary" id="register-btn" onclick="handleRegister()">
        Create Account
      </button>

      <div class="switch-link">
        Already have an account?
        <a href="/html/login.html">Login here</a>
      </div>
    </div>
  </div>

  <footer>
    Built with love by <span>Mzansi developers</span> for developers everywhere.
  </footer>

  <script src="/js/auth.js"></script>

</body>
</html>
